title: Extractor Scheduler
description: Run a data extraction Add-On (Azure Table Extractor or Textract Table Extractor) on a project of documents on a schedule, in batches.
type: object
documents:
  - selected
  - query
properties:
  extractor:
    title: Extractor
    type: string
    description: Which extraction Add-On to dispatch documents to.
    enum:
      - azure
      - textract
    default: azure

  batch_size:
    title: Batch Size
    type: integer
    description: Number of documents to dispatch per run.
    default: 25
required:
  - extractor
  - batch_size
eventOptions:
  name: extractor_scheduler
  events:
    - hourly
    - daily
    - weekly
categories: 
  - extract
version: 2
